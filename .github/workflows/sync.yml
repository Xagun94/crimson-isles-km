name: Discord Profile Sync

on:
  # Rulează automat la fiecare 2 ore
  schedule:
    - cron: '0 */2 * * *'

  # Permite rulare manuală din GitHub UI (butonul "Run workflow")
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Discord sync
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GITHUB_TOKEN:  ${{ secrets.GIST_TOKEN }}
          GIST_ID:       ${{ secrets.GIST_ID }}
          GUILD_ID:      ${{ secrets.GUILD_ID }}
          # ID-urile canalelor tale (carnivore, herbivore, etc.)
          CHANNEL_IDS:   ${{ secrets.CHANNEL_IDS }}
        run: node sync.js
